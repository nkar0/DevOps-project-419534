name: CI - Build, Test, Push, Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/app:${{ github.sha }}

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4

      - name: Uruchom testy jednostkowe
        run: |
          cd app
          python3 -m unittest -v

      - name: Zbuduj obraz Docker
        run: docker build -t "$IMAGE" .

      - name: Przetestuj obraz Docker
        run: |
          docker run -d \
            --name app-test \
            -p 8080:8080 \
            "$IMAGE"

          for attempt in {1..15}; do
            if curl --fail --silent http://localhost:8080/health; then
              echo
              echo "Test obrazu zakończony powodzeniem."
              docker rm -f app-test
              exit 0
            fi

            sleep 2
          done

          docker logs app-test
          docker rm -f app-test
          exit 1

      - name: Zaloguj się do Azure przez OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Zaloguj się do ACR
        run: |
          az acr login --name "${{ secrets.ACR_NAME }}"

      - name: Wyślij obraz do ACR
        run: docker push "$IMAGE"

      - name: Zainstaluj kubectl
        uses: azure/setup-kubectl@v4

      - name: Pobierz dane dostępowe AKS
        run: |
          az aks get-credentials \
            --resource-group "${{ secrets.RESOURCE_GROUP }}" \
            --name "${{ secrets.AKS_NAME }}" \
            --overwrite-existing

      - name: Zaktualizuj aplikację w AKS
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl set image deployment/app app="$IMAGE"
          kubectl rollout status deployment/app --timeout=300s

      - name: Wyświetl stan wdrożenia
        run: |
          kubectl get deployments
          kubectl get pods
          kubectl get services
